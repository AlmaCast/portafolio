<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box}
html,body{width:800px;height:320px;overflow:hidden}
.scrim{position:relative;width:800px;height:320px;
  background:linear-gradient(180deg,rgba(5,7,13,0) 0%,rgba(5,7,13,.32) 38%,rgba(5,7,13,.9) 100%)}
.wrap{position:absolute;left:0;right:0;bottom:34px;display:flex;align-items:center;justify-content:center;gap:15px}
.wrap img{width:66px;height:66px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.7))}
.wrap span{font-family:'Arial Black',sans-serif;font-size:40px;letter-spacing:5px;color:#fff;text-shadow:0 3px 12px rgba(0,0,0,.8)}
</style></head><body>
<div class="scrim"><div class="wrap"><img src="logo-blanco.png"><span>ALMA C.</span></div></div>
</body></html>
